<?xml version="1.0" encoding="UTF-8"?>
<!--
  PeerPulse mark — canonical
  Auto-adapts color via prefers-color-scheme:
    cream (#f3ead7) on dark surfaces, ink (#0c1222) on light.
  Inline-embedded SVGs (<svg> in HTML) instead inherit `currentColor`
  from the host, ignoring the internal stylesheet.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" color="#f3ead7" aria-label="PeerPulse">
  <title>PeerPulse</title>
  <style>
    svg { color: #f3ead7; }
    @media (prefers-color-scheme: light) { svg { color: #0c1222; } }
  </style>
  <circle cx="32" cy="32" r="27" stroke-width="4" opacity="0.4"/>
  <circle cx="32" cy="32" r="20" stroke-width="5" opacity="0.7"/>
  <circle cx="32" cy="32" r="9"  stroke-width="8"/>
  <path d="M 19 32 L 26 32 L 26 58.5 A 3.5 3.5 0 0 1 19 58.5 Z" fill="currentColor" stroke="none"/>
</svg>
